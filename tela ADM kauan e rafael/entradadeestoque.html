<!DOCTYPE html>
<!--
    ============================================
    TELA 5 - ENTRADA DE ESTOQUE
    Feita por: Vitor Bessa Nunes
    ============================================
    O QUE ESSA TELA FAZ:
    Formulario que o administrador usa quando chega mais
    mercadoria no estoque. Ele digita qual produto chegou
    e quantas unidades, e clica em Confirmar Entrada.

    PRINCIPAIS PARTES DO CODIGO:
    - <aside class="sidebar">: menu lateral (igual em todas as telas)
    - <main class="conteudo">: area com o titulo e o formulario
    - <form class="form-entrada">: o formulario com 2 campos:
        1. Campo "Produto" (texto): nome do produto
        2. Campo "Quantidade a adicionar" (numero): unidades que chegaram
        3. Botao "Confirmar Entrada": envia o formulario

    COMO ADICIONAR UM NOVO CAMPO NO FORMULARIO:
    Antes do <button>, adicionar:
        <label>Nome do Campo</label>
        <input type="text">     <- ou number, date, etc.
-->

<head>
  <meta charset="UTF-8">
  <title>Entrada de Estoque</title>
  <link rel="stylesheet" href="stylekauan.css">
</head>
<body>

<div class="dashboard">

  <aside class="sidebar">
    <div class="logo">
      <h2>Stock Fácil</h2>

    </nav>

    <a href="login.html" class="sair"> Sair</a>
  </aside>

  <main class="conteudo">
    <h1>Entrada de Estoque</h1>

    <form class="form-entrada">
      <label>Produto</label>
      <input type="text">

      <label>Quantidade a adicionar:</label>
      <input type="number">

      <button type="submit">Confirmar Entrada</button>
    </form>
  </main>

</div>
