  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" href="stylekauan.css">
</head>
<body>

<div class="dashboard">

  <aside class="sidebar">

    <div class="logo">
      <h2>Stock Fácil</h2>
      <p>Painel do Administrador</p>
    </div>

    <nav class="menu">

      <a href="dashboard.html"> Dashboard</a>

      <span>Gestão de Estoque</span>

      <a href="cadastrodeprodutos.html" class="ativo">
         Cadastro de Produtos
      </a>

      <a href="listadeprodutos.html"> Lista de Produtos</a>

      <a href="entradadeestoque.html"> Entrada de Estoque</a>

    <a href="login.html" class="sair">
       Sair
    </a>

  </aside>

  <main class="conteudo">

    <h1>Cadastro Produto Novo</h1>

    <form class="form-produto">

      <label>Nome do Produto</label>
      <input type="text">

      <div class="linha-form">

        <div>
          <label>Quantidade</label>
          <input type="number">
        </div>

        <div>
          <label>Estoque Mínimo</label>
          <input type="number">
        </div>

      </div>

      <div class="linha-form">

        <div>
          <label>Preço Custo (R$)</label>
          <input type="text">
        </div>

        <div>
          <label>Preço Venda (R$)</label>
          <input type="text">
        </div>

      </div>

      <button type="submit">
        Salvar Produto
      </button>

    </form>

  </main>

</div>
